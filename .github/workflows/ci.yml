name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  rust-fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: cargo fmt --check
        run: cargo fmt --all --check --manifest-path crates/steprs-core/Cargo.toml

  rust-wasm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Unit and integration tests (WASM / production path)
        run: cargo test --manifest-path crates/steprs-core/Cargo.toml --lib --tests --no-default-features
      - name: NIST MBE golden suite
        run: cargo test --manifest-path crates/steprs-core/Cargo.toml --test golden_suite --no-default-features
      - name: golden scorecard (Gate 1)
        run: cargo run --example golden_report --manifest-path crates/steprs-core/Cargo.toml --no-default-features
      - name: Generate SCORECARD.md
        run: ./scripts/generate-scorecard.sh
      - name: Verify SCORECARD.md is committed
        run: git diff --exit-code SCORECARD.md
      - name: JSON Schema contract (ParseResult)
        run: |
          cargo run --example generate_schema --manifest-path crates/steprs-core/Cargo.toml --no-default-features
          git diff --exit-code packages/ts-types/parse-result.schema.json
      - name: cargo clippy (WASM path)
        run: cargo clippy --manifest-path crates/steprs-core/Cargo.toml --no-default-features -- -D warnings

  wasm-freshness:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn
      - run: corepack enable
      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
      - name: Build WASM
        run: wasm-pack build crates/steprs-core --target web --out-dir ../../apps/web/public/wasm -- --no-default-features && rm -f apps/web/public/wasm/.gitignore
      - name: Verify committed WASM matches build
        run: git diff --exit-code apps/web/public/wasm/
      - name: WASM smoke (holes vs native snapshots)
        run: node apps/web/scripts/wasm-smoke-test.mjs

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn
      - run: corepack enable
      - run: yarn install --immutable
      - run: yarn workspace @steprs/web sync:occt
      - name: Verify committed OCCT assets match package
        run: git diff --exit-code apps/web/public/occt/
      - run: yarn workspace @steprs/web lint
      - run: yarn workspace @steprs/web typecheck
      - run: yarn workspace @steprs/web test:unit
      - run: yarn workspace @steprs/web build
      - name: Install Playwright browsers
        run: yarn workspace @steprs/web exec playwright install chromium --with-deps
      - name: Playwright E2E (sample part hole count)
        run: yarn workspace @steprs/web test:e2e
